<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento da Sala</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            font-family:Arial, Helvetica, sans-serif;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:#1e293b;
            width:420px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            font-size:32px;
        }

        .status-box{
            background:#0f172a;
            padding:25px;
            border-radius:15px;
        }

        .titulo{
            color:#94a3b8;
            font-size:18px;
            margin-bottom:15px;
        }

        .status{
            font-size:32px;
            color:#38bdf8;
            font-weight:bold;
        }

        .horario{
            margin-top:25px;
            font-size:18px;
            color:#cbd5e1;
        }

        .online{
            margin-top:25px;
            color:#22c55e;
            font-size:15px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h1>Monitoramento da Sala</h1>

        <div class="status-box">

            <div class="titulo">
                Último Movimento Detectado
            </div>

            <div class="status" id="status">
                Carregando...
            </div>

        </div>

        <div class="horario" id="horario">
            --
        </div>

        <div class="online">
            Sistema online • Atualização automática
        </div>

    </div>

<script>

const url =
"https://opensheet.elk.sh/1zpkk971HTSDc9QPBw6GJSGmD8LWrpLo9uHOMsyqEkpc/P%C3%A1gina1";

async function atualizarDados(){

    try{

        const resposta = await fetch(url);

        const dados = await resposta.json();

        console.log(dados);

        if(dados.length > 0){

            const ultimo = dados[dados.length - 1];

            document.getElementById("status").innerText =
                ultimo["Movimentos "];

            document.getElementById("horario").innerText =
                "Horário: " + ultimo["Status e Data"];

        }else{

            document.getElementById("status").innerText =
                "Sem dados";

        }

    }catch(erro){

        console.log(erro);

        document.getElementById("status").innerText =
            "Erro ao carregar";

    }

}

atualizarDados();

setInterval(atualizarDados, 5000);

</script>

</body>
</html>
