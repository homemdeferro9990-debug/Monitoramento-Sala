<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Monitoramento</title>
</head>
<body style="background:black;color:white;font-family:Arial;text-align:center;padding-top:100px;">

    <h1>Monitoramento da Sala</h1>

    <h2 id="status">Carregando...</h2>

    <p id="horario"></p>

<script>

async function carregar(){

    try{

        const resposta = await fetch(
            "https://opensheet.elk.sh/1zpkk971HTSDc9QPBw6GJSGmD8LWrpLo9uHOMsyqEkpc/P%C3%A1gina1"
        );

        const dados = await resposta.json();

        console.log(dados);

        const ultimo = dados[dados.length - 1];

        const valores = Object.values(ultimo);

        document.getElementById("status").innerText = valores[1];

        document.getElementById("horario").innerText = valores[0];

    }catch(erro){

        console.log(erro);

        document.getElementById("status").innerText = "Erro ao carregar";

    }

}

carregar();

setInterval(carregar, 5000);

</script>

</body>
</html>
