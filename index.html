<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento da Sala</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            text-align:center;
            width:350px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        h1{
            margin-bottom:20px;
        }

        .status{
            font-size:30px;
            margin:20px 0;
            color:#38bdf8;
        }

        .horario{
            color:#cbd5e1;
            font-size:18px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Monitoramento da Sala</h1>

        <div class="status" id="status">
            Carregando...
        </div>

        <div class="horario" id="horario"></div>
    </div>

    <script>

        const sheetID = "1zpkk971HTSDc9QPBw6GJSGmD8LWrpLo9uHOMsyqEkpc";

        const url = `https://opensheet.elk.sh/${sheetID}/Página1`;

        async function carregarDados(){

            try{

                const resposta = await fetch(url);
                const dados = await resposta.json();

                const ultimo = dados[dados.length - 1];

                document.getElementById("status").innerText = ultimo[Object.keys(ultimo)[1]];
                document.getElementById("horario").innerText = ultimo[Object.keys(ultimo)[0]];

            }catch(erro){

                document.getElementById("status").innerText = "Erro ao carregar";

            }
        }

        carregarDados();

        setInterval(carregarDados, 5000);

    </script>

</body>
</html>
