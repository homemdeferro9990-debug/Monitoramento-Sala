<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Sala</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1>Status da Sala</h1>

    <div id="status" class="status">
      Carregando...
    </div>

    <p id="tempo"></p>
  </div>

  <script>
    const url = "https://opensheet.elk.sh/1zpkk971HTSDc9QPBw6GJSGmD8LWrpLo9uHOMsyqEkpc/Página1";

    function atualizar() {
      fetch(url)
        .then(res => res.json())
        .then(data => {
          let ultimo = data[data.length - 1];

          let statusDiv = document.getElementById("status");
          let tempo = document.getElementById("tempo");

          if (ultimo.status === "ocupado") {
            // TEM GENTE
            statusDiv.innerText = "🟢 Disponível";
            statusDiv.className = "status livre";
          } else {
            // NÃO TEM GENTE
            statusDiv.innerText = "🔴 Indisponível";
            statusDiv.className = "status ocupado";
          }

          tempo.innerText =
            "Tempo ativo: " + ultimo.tempo_ativo + "s | " +
            "Tempo inativo: " + ultimo.tempo_inativo + "s";
        });
    }

    setInterval(atualizar, 5000);
    atualizar();
  </script>
</body>
</html>
