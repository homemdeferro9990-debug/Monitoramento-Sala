<script>
  let minutos = 0;

  setInterval(() => {
    minutos++;

    document.getElementById("tempo").innerText = minutos + " min";
    document.getElementById("atividade").innerText = "Há " + minutos + " min";

    if (minutos >= 10) {
      document.getElementById("status").innerText = "🟢 Sala Livre";
      document.getElementById("status").className = "status livre";
    } else {
      document.getElementById("status").innerText = "🔴 Sala Ocupada";
      document.getElementById("status").className = "status ocupado";
    }

  }, 60000);
</script>
