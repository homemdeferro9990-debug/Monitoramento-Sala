<!DOCTYPE html>
<html>
<head>
  <title>Monitoramento de Sala</title>
</head>
<body>

<h1 id="status">Carregando...</h1>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "monitoramento-sala.firebaseapp.com",
  databaseURL: "https://monitoramento-sala-default-rtdb.firebaseio.com",
  projectId: "monitoramento-sala"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// caminho do banco
const statusRef = ref(db, 'sala/status');

// ouvir mudanças
onValue(statusRef, (snapshot) => {
  const status = snapshot.val();
  document.getElementById("status").innerText =
    status === "ocupado" ? "🔴 Sala ocupada" : "🟢 Sala livre";
});
</script>

</body>
</html>
