<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Sala</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    .ocupado {
      color: red;
      font-size: 40px;
    }

    .livre {
      color: green;
      font-size: 40px;
    }
  </style>
</head>

<body>
  <h1>Status da Sala</h1>
  <div id="status">Carregando...</div>

  <script>
    const url = "https://opensheet.elk.sh/1zpkk971HTSDc9QPBw6GJSGmD8LWrpLo9uHOMsyqEkpc/Página1";

    function atualizar() {
      fetch(url)
        .then(res => res.json())
        .then(data => {
          let ultimo = data[data.length - 1];

          let statusDiv = document.getElementById("status");

          if (ultimo.status === "ocupado") {
            statusDiv.innerHTML = "🔴 Sala Ocupada";
            statusDiv.className = "ocupado";
          } else {
            statusDiv.innerHTML = "🟢 Sala Livre";
            statusDiv.className = "livre";
          }
        });
    }

    setInterval(atualizar, 5000);
    atualizar();
  </script>
</body>
</html>
